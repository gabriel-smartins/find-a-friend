version: '3.8'

services:
  postgres-db:
    image: postgres:14-alpine

    container_name: find-friend-db

    restart: always

    ports:
      - '5432:5432'

    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: findfriendapi

    volumes:
      - pgdata:/data/postgres

volumes:
  pgdata:
    driver: local
